<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Site</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
    }

    /* Fullscreen loader */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000; /* optional background */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #content {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Only Image -->
  <div id="loader">
    <img src="Muhammed Sinaan T S_20260401_223134_0000.jpg" alt="loading">
  </div>

  <!-- Your Website -->
  <div id="content">
    <h1>My Website</h1>
  </div>

  <script>
    window.onload = function () {
      document.getElementById("loader").style.display = "none";
      document.getElementById("content").style.display = "block";
    };
  </script>

</body>
</html>
